  source:
    remote:
      path: SonghayCore/Xml/HtmlUtility.Regex.cs
      branch: main
      repo: git@github.com:BryanWilhite/SonghayCore.git
    id: MatchXhtmlSelfClosingTags
    path: ../SonghayCore/Xml/HtmlUtility.Regex.cs
    startLine: 47
  assemblies:
  - SonghayCore
  namespace: Songhay.Xml
  remarks: >-
    Pattern:<br />

    <pre><code class="lang-csharp">&lt;\\s*(br|hr|img|link|meta)([^&gt;]*)(&gt;)</code></pre><br />
        Options:<br />
        <pre><code class="lang-csharp">RegexOptions.IgnoreCase</code></pre><br />
        Explanation:<br />
        <pre><code class="lang-csharp">○ Match '<'.
    ○ Match a whitespace character atomically any number of times.

    ○ 1st capture group.
        ○ Match with 5 alternative expressions.
            ○ Match a sequence of expressions.
                ○ Match a character in the set [Bb].
                ○ Match a character in the set [Rr].
            ○ Match a sequence of expressions.
                ○ Match a character in the set [Hh].
                ○ Match a character in the set [Rr].
            ○ Match a sequence of expressions.
                ○ Match a character in the set [Ii].
                ○ Match a character in the set [Mm].
                ○ Match a character in the set [Gg].
            ○ Match a sequence of expressions.
                ○ Match a character in the set [Ll].
                ○ Match a character in the set [Ii].
                ○ Match a character in the set [Nn].
                ○ Match a character in the set [Kk\u212A].
            ○ Match a sequence of expressions.
                ○ Match a character in the set [Mm].
                ○ Match a character in the set [Ee].
                ○ Match a character in the set [Tt].
                ○ Match a character in the set [Aa].
    ○ 2nd capture group.
        ○ Match a character other than '&gt;' atomically any number of times.
    ○ 3rd capture group.
        ○ Match '&gt;'.</code></pre>
  example: []
  syntax:
    content: >-
      [GeneratedRegex("<\\s*(br|hr|img|link|meta)([^>]*)(>)", RegexOptions.IgnoreCase)]

      public static Regex MatchXhtmlSelfClosingTags()
    return:
      type: System.Text.RegularExpressions.Regex
    content.vb: >-
      <GeneratedRegex("<\s*(br|hr|img|link|meta)([^>]*)(>)", RegexOptions.IgnoreCase)>

      Public Shared Function MatchXhtmlSelfClosingTags() As Regex
  overload: Songhay.Xml.HtmlUtility.MatchXhtmlSelfClosingTags*
  attributes:
  - type: System.Text.RegularExpressions.GeneratedRegexAttribute
    ctor: System.Text.RegularExpressions.GeneratedRegexAttribute.#ctor(System.String,System.Text.RegularExpressions.RegexOptions)
    arguments:
    - type: System.String
      value: <\s*(br|hr|img|link|meta)([^>]*)(>)
    - type: System.Text.RegularExpressions.RegexOptions
      value: 1
