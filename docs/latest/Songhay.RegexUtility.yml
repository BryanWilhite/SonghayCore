  remarks: >-
    Pattern:<br />

    <pre><code class="lang-csharp">(["'])(?:(?=(\\\\?))\\2.)*?\\1</code></pre><br />
        Explanation:<br />
        <pre><code class="lang-csharp">○ 1st capture group.
        ○ Match a character in the set ["'].
    ○ Loop lazily any number of times.
        ○ Zero-width positive lookahead.
            ○ 2nd capture group.
                ○ Match '\\' atomically, optionally.
        ○ Match the same text as matched by the 2nd capture group.
        ○ Match any character other than '\n'.
    ○ Match the same text as matched by the 1st capture group.</code></pre>
  example: []
