    startLine: 35
  assemblies:
  - SonghayCore
  namespace: Songhay
  remarks: >-
    Pattern:<br />

    <pre><code class="lang-csharp">^(\\\\(\\\\[^\\s\\\\]+)+|([A-Za-z]:(\\\\)?|[A-z]:(\\\\[^\\s\\\\]+)+))(\\\\)?$</code></pre><br />
        Explanation:<br />
        <pre><code class="lang-csharp">○ Match if at the beginning of the string.
    ○ 1st capture group.
        ○ Match with 2 alternative expressions.
            ○ Match a sequence of expressions.
                ○ Match '\\'.
                ○ Loop greedily at least once.
                    ○ 2nd capture group.
                        ○ Match '\\'.
                        ○ Match a character in the set [^\\\s] greedily at least once.
            ○ 3rd capture group.
                ○ Match with 2 alternative expressions.
                    ○ Match a sequence of expressions.
                        ○ Match an ASCII letter.
                        ○ Match ':'.
                        ○ Optional (greedy).
                            ○ 4th capture group.
                                ○ Match '\\'.
                    ○ Match a sequence of expressions.
                        ○ Match a character in the set [A-z].
                        ○ Match ':'.
                        ○ Loop greedily at least once.
                            ○ 5th capture group.
                                ○ Match '\\'.
                                ○ Match a character in the set [^\\\s] greedily at least once.
    ○ Optional (greedy).
        ○ 6th capture group.
            ○ Match '\\'.
    ○ Match if at the end of the string or if before an ending newline.</code></pre>
  example: []
  syntax:
    content: >-
      [GeneratedRegex("^(\\\\(\\\\[^\\s\\\\]+)+|([A-Za-z]:(\\\\)?|[A-z]:(\\\\[^\\s\\\\]+)+))(\\\\)?$")]

      public static Regex MatchAllThatLooksLikeUnc()
    return:
      type: System.Text.RegularExpressions.Regex
    content.vb: >-
      <GeneratedRegex("^(\\(\\[^\s\\]+)+|([A-Za-z]:(\\)?|[A-z]:(\\[^\s\\]+)+))(\\)?$")>

