  remarks: >-
    Pattern:<br />

    <pre><code class="lang-csharp">\\w+([-+.']\\w+)*@\\w+([-.]\\w+)*\\.\\w+([-.]\\w+)*</code></pre><br />
        Explanation:<br />
        <pre><code class="lang-csharp">○ Match a word character greedily at least once.
    ○ Loop greedily any number of times.
        ○ 1st capture group.
            ○ Match a character in the set ['+\-.].
            ○ Match a word character atomically at least once.
    ○ Match '@'.

    ○ Match a word character greedily at least once.

    ○ Loop greedily any number of times.
        ○ 2nd capture group.
            ○ Match a character in the set [\-.].
            ○ Match a word character atomically at least once.
    ○ Match '.'.

    ○ Match a word character greedily at least once.

    ○ Loop atomically any number of times.
        ○ 3rd capture group.
            ○ Match a character in the set [\-.].
            ○ Match a word character atomically at least once.</code></pre>
